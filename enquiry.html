    <main class="container">
      <h1>Enquiry Form</h1>
      <p>Use this form for service, product, volunteer, or sponsorship enquiries.</p>

      <form id="enquiryForm" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" required minlength="3">
          <small class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required>
          <small class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" pattern="[0-9+ ]{10,15}" required>
          <small class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="enquiryType">Enquiry Type</label>
          <select id="enquiryType" name="enquiryType" required>
            <option value="">Select one</option>
            <option value="service">Service enquiry</option>
            <option value="product">Product enquiry</option>
            <option value="volunteer">Volunteer enquiry</option>
            <option value="sponsor">Sponsor enquiry</option>
          </select>
          <small class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="budget">Estimated Budget (ZAR)</label>
          <input type="number" id="budget" name="budget" min="0" step="100">
          <small class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="details">Enquiry Details</label>
          <textarea id="details" name="details" rows="5" required minlength="20"></textarea>
          <small class="error-message"></small>
        </div>

        <button type="submit" class="button">Submit Enquiry</button>
      </form>

      <section id="enquiryResponse" class="response-box" aria-live="polite"></section>
    </main>
